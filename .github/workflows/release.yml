name: release

# Tag a version to cut a release: `git tag v0.1.0 && git push --tags`.
# Builds the static edfs binary and attaches it to the GitHub Release, so
# install.sh can curl it straight down (no package manager).
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build edfs (static, no cgo)
        run: CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -o edfs-linux-amd64 ./linux

      - name: Attach binary to release
        uses: softprops/action-gh-release@v2
        with:
          files: edfs-linux-amd64
